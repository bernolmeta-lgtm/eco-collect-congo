<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Green - EcoCollect Congo</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* --- CSS amélioré avec signature en bas et style responsive --- */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background-color: #f0fdf4;
      color: #064e3b;
    }

    .container {
      flex: 1;
      max-width: 600px;
      margin: auto;
    }

    h1, h2 {
      color: #065f46;
      margin-top: 20px;
    }

    button {
      padding: 10px 20px;
      margin: 10px 0;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background-color: #10b981;
      color: white;
      font-weight: bold;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #059669;
    }

    input, textarea {
      width: 100%;
      padding: 8px;
      margin: 5px 0 15px;
      border-radius: 6px;
      border: 1px solid #d1fae5;
      box-sizing: border-box;
    }

    pre {
      background-color: #e6f4ea;
      padding: 10px;
      border-radius: 6px;
      overflow-x: auto;
    }

    form {
      background-color: #d1fae5;
      padding: 15px;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      font-size: 0.9em;
      color: #064e3b;
      margin-top: 20px;
      padding: 10px 0;
    }

    .location-btn {
      display: block;
      margin: 10px 0;
      background-color: #3b82f6;
    }

    .location-btn:hover {
      background-color: #2563eb;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Sélecteur de langue -->
    <div style="text-align: right; margin-bottom: 10px;">
      <label for="langSelect">Langue: </label>
      <select id="langSelect">
        <option value="fr">Français</option>
        <option value="ln">Lingala</option>
        <option value="kt">Kituba</option>
      </select>
    </div>

    <h1 id="title">Green - EcoCollect Congo</h1>

    <section>
      <h2 id="apiTestTitle">Tester l'API</h2>
      <button id="statusBtn">Vérifier le statut</button>
      <pre id="statusResult"></pre>
    </section>

    <section>
      <h2 id="addReportTitle">Ajouter un rapport</h2>
      <form id="reportForm">
        <input type="text" name="name" placeholder="Nom" required>
        <textarea name="description" placeholder="Description" required></textarea>
        <input type="file" name="file"><br>
        <button type="button" class="location-btn" id="useLocationBtn">Utiliser ma position</button>
        <button type="submit">Envoyer</button>
      </form>
      <pre id="reportResult"></pre>
    </section>

    <section>
      <h2 id="listReportsTitle">Liste des rapports</h2>
      <button id="listBtn">Voir tous les rapports</button>
      <pre id="reportsList"></pre>
    </section>

  </div>

  <!-- Signature -->
  <footer>
    Developed by Lulian Meta, ©2026 Tous droits réservés
  </footer>

  <script src="app.js"></script>
  <script>
    // --- Traductions ---
    const translations = {
      fr: {
        title: "Green - EcoCollect Congo",
        apiTestTitle: "Tester l'API",
        statusBtn: "Vérifier le statut",
        addReportTitle: "Ajouter un rapport",
        listReportsTitle: "Liste des rapports",
        listBtn: "Voir tous les rapports",
        namePlaceholder: "Nom",
        descriptionPlaceholder: "Description",
        submitBtn: "Envoyer",
        locationBtn: "Utiliser ma position"
      },
      ln: {
        title: "Green - EcoCollect Congo",
        apiTestTitle: "Kokanga API",
        statusBtn: "Talá état",
        addReportTitle: "Kokoma rapport",
        listReportsTitle: "Liste ya rapports",
        listBtn: "Talá nyonso",
        namePlaceholder: "Kombo",
        descriptionPlaceholder: "Likonzi",
        submitBtn: "Tinda",
        locationBtn: "Sikisa esika na ngai"
      },
      kt: {
        title: "Green - EcoCollect Congo",
        apiTestTitle: "Kusadila API",
        statusBtn: "Vérifier état",
        addReportTitle: "Kusadila rapport",
        listReportsTitle: "List ya rapports",
        listBtn: "Vérifier nyonso",
        namePlaceholder: "Nkombo",
        descriptionPlaceholder: "Discription",
        submitBtn: "Tinda",
        locationBtn: "Kusadila esika na ngai"
      }
    };

    const langSelect = document.getElementById('langSelect');
    const useLocationBtn = document.getElementById('useLocationBtn');
    const reportForm = document.getElementById('reportForm');

    function updateLanguage(lang) {
      document.getElementById('title').textContent = translations[lang].title;
      document.getElementById('apiTestTitle').textContent = translations[lang].apiTestTitle;
      document.getElementById('statusBtn').textContent = translations[lang].statusBtn;
      document.getElementById('addReportTitle').textContent = translations[lang].addReportTitle;
      document.getElementById('listReportsTitle').textContent = translations[lang].listReportsTitle;
      document.getElementById('listBtn').textContent = translations[lang].listBtn;
      document.querySelector('input[name="name"]').placeholder = translations[lang].namePlaceholder;
      document.querySelector('textarea[name="description"]').placeholder = translations[lang].descriptionPlaceholder;
      reportForm.querySelector('button[type="submit"]').textContent = translations[lang].submitBtn;
      useLocationBtn.textContent = translations[lang].locationBtn;
    }

    langSelect.addEventListener('change', (e) => updateLanguage(e.target.value));
    updateLanguage('fr');

    // --- Géolocalisation ---
    useLocationBtn.addEventListener('click', () => {
      if (!navigator.geolocation) {
        alert('Géolocalisation non supportée par votre navigateur');
        return;
      }
      navigator.geolocation.getCurrentPosition(
        position => {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          // Insère la position dans la description du rapport
          const desc = document.querySelector('textarea[name="description"]');
          desc.value = `Latitude: ${lat}, Longitude: ${lon}`;
        },
        err => {
          alert('Impossible de récupérer la position: ' + err.message);
        }
      );
    });
  </script>
</body>
</html>
